# =============================================================================
# GEON Docker Compose — n8n, Elasticsearch, GDELT, OpenCTI
# Geopolitical & Cyber Threat Intelligence Platform
# =============================================================================
# Usage:
#   docker compose -f docker/docker-compose.yml up -d
#
# Prerequisites:
#   - .env file at project root (copy from .env.example)
#   - sudo sysctl -w vm.max_map_count=262144
# =============================================================================

networks:
  geon_net:
    external: true

volumes:
  # Map to existing Docker volumes to preserve data across rename
  geon_elasticsearch_data:
    name: docker_geon_elasticsearch_data
    external: true
  geon_redis_data:
    name: docker_geon_redis_data
    external: true
  geon_rabbitmq_data:
    name: docker_geon_rabbitmq_data
    external: true
  geon_minio_data:
    name: docker_geon_minio_data
    external: true
  geon_prometheus_data:
    name: docker_geon_prometheus_data
    external: true
  geon_grafana_data:
    name: docker_geon_grafana_data
    external: true
  geon_authelia_data:
    name: docker_geon_authelia_data
    external: true
  geon_n8n_data:
    name: docker_geon_n8n_data
    external: true

services:
  # ===========================================================================
  # NGINX — Internal Reverse Proxy
  # ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: geon-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ../landing:/usr/share/nginx/html/landing:ro
    networks:
      - geon_net
    depends_on:
      authelia:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "geon.service=nginx"
      - "geon.role=reverse-proxy"

  # ===========================================================================
  # ELASTICSEARCH — Storage for OpenCTI + Ingestors + Grafana
  # ===========================================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION}
    container_name: geon-elasticsearch
    restart: unless-stopped
    environment:
      - cluster.name=${ELASTIC_CLUSTER_NAME:-geon}
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.license.self_generated.type=basic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - "ES_JAVA_OPTS=-Xms${ELASTIC_HEAP_SIZE:-2g} -Xmx${ELASTIC_HEAP_SIZE:-2g}"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - geon_elasticsearch_data:/usr/share/elasticsearch/data
      - ./elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    networks:
      - geon_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    labels:
      - "geon.service=elasticsearch"
      - "geon.role=storage"

  # ===========================================================================
  # REDIS — Cache for OpenCTI
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: geon-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - geon_redis_data:/data
    networks:
      - geon_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "geon.service=redis"
      - "geon.role=cache"

  # ===========================================================================
  # RABBITMQ — Message Broker for OpenCTI
  # ===========================================================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: geon-rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
      - RABBITMQ_NODENAME=rabbit@rabbitmq
    volumes:
      - geon_rabbitmq_data:/var/lib/rabbitmq
    networks:
      - geon_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - "geon.service=rabbitmq"
      - "geon.role=broker"

  # ===========================================================================
  # MINIO — Object Storage for OpenCTI
  # ===========================================================================
  minio:
    image: minio/minio
    container_name: geon-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - geon_minio_data:/data
    networks:
      - geon_net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    labels:
      - "geon.service=minio"
      - "geon.role=object-storage"

  # ===========================================================================
  # OPENCTI — Cyber Threat Intelligence Platform
  # ===========================================================================
  opencti:
    image: opencti/platform:${OPENCTI_VERSION}
    container_name: geon-opencti
    restart: unless-stopped
    environment:
      - NODE_OPTIONS=--max-old-space-size=8096
      - APP__PORT=8080
      - APP__BASE_URL=https://${GEON_DOMAIN}/opencti
      - APP__BASE_PATH=/opencti
      - APP__ADMIN__EMAIL=${OPENCTI_ADMIN_EMAIL}
      - APP__ADMIN__PASSWORD=${OPENCTI_ADMIN_PASSWORD}
      - APP__ADMIN__TOKEN=${OPENCTI_ADMIN_TOKEN}
      - APP__HEALTH_ACCESS_KEY=${OPENCTI_HEALTHCHECK_KEY}
      - APP__APP_LOGS__LOGS_LEVEL=error
      - REDIS__HOSTNAME=redis
      - REDIS__PORT=6379
      - ELASTICSEARCH__URL=http://elasticsearch:9200
      - ELASTICSEARCH__USERNAME=elastic
      - ELASTICSEARCH__PASSWORD=${ELASTIC_PASSWORD}
      - ELASTICSEARCH__NUMBER_OF_REPLICAS=0
      - ELASTICSEARCH__NUMBER_OF_SHARDS=1
      - MINIO__ENDPOINT=minio
      - MINIO__PORT=9000
      - MINIO__USE_SSL=false
      - MINIO__ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO__SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - RABBITMQ__HOSTNAME=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__PORT_MANAGEMENT=15672
      - RABBITMQ__MANAGEMENT_SSL=false
      - RABBITMQ__USERNAME=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ__PASSWORD=${RABBITMQ_DEFAULT_PASS}
      - PROVIDERS__LOCAL__STRATEGY=LocalStrategy
    networks:
      - geon_net
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8080/opencti/health?health_access_key=${OPENCTI_HEALTHCHECK_KEY} || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 120s
    labels:
      - "geon.service=opencti"
      - "geon.role=cti-platform"

  # ===========================================================================
  # OPENCTI WORKERS — Background Processing
  # ===========================================================================
  opencti-worker-1:
    image: opencti/worker:${OPENCTI_VERSION}
    container_name: geon-opencti-worker-1
    restart: unless-stopped
    environment:
      - OPENCTI_URL=http://opencti:8080/opencti
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - WORKER_LOG_LEVEL=info
    networks:
      - geon_net
    depends_on:
      opencti:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f worker || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - "geon.service=opencti-worker"
      - "geon.role=cti-worker"

  opencti-worker-2:
    image: opencti/worker:${OPENCTI_VERSION}
    container_name: geon-opencti-worker-2
    restart: unless-stopped
    environment:
      - OPENCTI_URL=http://opencti:8080/opencti
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - WORKER_LOG_LEVEL=info
    networks:
      - geon_net
    depends_on:
      opencti:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f worker || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - "geon.service=opencti-worker"
      - "geon.role=cti-worker"

  opencti-worker-3:
    image: opencti/worker:${OPENCTI_VERSION}
    container_name: geon-opencti-worker-3
    restart: unless-stopped
    environment:
      - OPENCTI_URL=http://opencti:8080/opencti
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - WORKER_LOG_LEVEL=info
    networks:
      - geon_net
    depends_on:
      opencti:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f worker || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - "geon.service=opencti-worker"
      - "geon.role=cti-worker"

  # ===========================================================================
  # OPENCTI CONNECTORS
  # ===========================================================================
  opencti-connector-mitre:
    image: opencti/connector-mitre:${OPENCTI_VERSION}
    container_name: geon-connector-mitre
    restart: unless-stopped
    environment:
      - OPENCTI_URL=http://opencti:8080/opencti
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${MITRE_CONNECTOR_ID}
      - CONNECTOR_NAME=MITRE ATT&CK
      - CONNECTOR_SCOPE=marking-definition,identity,attack-pattern,course-of-action,intrusion-set,campaign,malware,tool,vulnerability,x-mitre-data-source,x-mitre-data-component,x-mitre-matrix,x-mitre-tactic,x-mitre-collection
      - CONNECTOR_TYPE=EXTERNAL_IMPORT
      - CONNECTOR_LOG_LEVEL=info
      - CONNECTOR_RUN_AND_TERMINATE=false
      - MITRE_ENTERPRISE_FILE_URL=https://raw.githubusercontent.com/mitre-attack/attack-stix-data/master/enterprise-attack/enterprise-attack.json
      - MITRE_MOBILE_ATTACK_FILE_URL=https://raw.githubusercontent.com/mitre-attack/attack-stix-data/master/mobile-attack/mobile-attack.json
      - MITRE_ICS_ATTACK_FILE_URL=https://raw.githubusercontent.com/mitre-attack/attack-stix-data/master/ics-attack/ics-attack.json
      - MITRE_INTERVAL=7
    networks:
      - geon_net
    depends_on:
      opencti:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f connector || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  opencti-connector-alienvault:
    image: opencti/connector-alienvault:${OPENCTI_VERSION}
    container_name: geon-connector-alienvault
    restart: unless-stopped
    environment:
      - OPENCTI_URL=http://opencti:8080/opencti
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${ALIENVAULT_CONNECTOR_ID}
      - CONNECTOR_NAME=AlienVault OTX
      - CONNECTOR_SCOPE=alienvault
      - CONNECTOR_TYPE=EXTERNAL_IMPORT
      - CONNECTOR_LOG_LEVEL=info
      - CONNECTOR_RUN_AND_TERMINATE=false
      - ALIENVAULT_BASE_URL=https://otx.alienvault.com
      - ALIENVAULT_API_KEY=${ALIENVAULT_API_KEY}
      - ALIENVAULT_TLP=White
      - ALIENVAULT_CREATE_OBSERVABLES=true
      - ALIENVAULT_CREATE_INDICATORS=true
      - ALIENVAULT_PULSE_START_TIMESTAMP=2024-01-01T00:00:00
      - ALIENVAULT_REPORT_TYPE=threat-report
      - ALIENVAULT_REPORT_STATUS=New
      - ALIENVAULT_GUESS_MALWARE=false
      - ALIENVAULT_GUESS_CVE=false
      - ALIENVAULT_EXCLUDED_PULSE_INDICATOR_TYPES=FileHash-PEHASH,FileHash-IMPHASH
      - ALIENVAULT_ENABLE_RELATIONSHIPS=true
      - ALIENVAULT_ENABLE_ATTACK_PATTERNS_INDICATES=true
      - ALIENVAULT_INTERVAL=360
    networks:
      - geon_net
    depends_on:
      opencti:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f connector || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  opencti-connector-cisa-kev:
    image: opencti/connector-cisa-known-exploited-vulnerabilities:${OPENCTI_VERSION}
    container_name: geon-connector-cisa-kev
    restart: unless-stopped
    environment:
      - OPENCTI_URL=http://opencti:8080/opencti
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CISA_KEV_CONNECTOR_ID}
      - CONNECTOR_NAME=CISA Known Exploited Vulnerabilities
      - CONNECTOR_SCOPE=cisa
      - CONNECTOR_TYPE=EXTERNAL_IMPORT
      - CONNECTOR_LOG_LEVEL=info
      - CONNECTOR_RUN_AND_TERMINATE=false
      - CISA_CATALOG_URL=https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json
      - CISA_INTERVAL=24
      - CISA_CREATE_INFRASTRUCTURES=false
      - CISA_TLP=TLP:CLEAR
    networks:
      - geon_net
    depends_on:
      opencti:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f connector || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  opencti-connector-cve:
    image: opencti/connector-cve:${OPENCTI_VERSION}
    container_name: geon-connector-cve
    restart: unless-stopped
    environment:
      - OPENCTI_URL=http://opencti:8080/opencti
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CVE_CONNECTOR_ID}
      - CONNECTOR_NAME=Common Vulnerabilities and Exposures
      - CONNECTOR_SCOPE=identity,vulnerability
      - CONNECTOR_TYPE=EXTERNAL_IMPORT
      - CONNECTOR_LOG_LEVEL=info
      - CONNECTOR_RUN_AND_TERMINATE=false
      - CVE_BASE_URL=https://services.nvd.nist.gov/rest/json/cves
      - CVE_INTERVAL=24
      - CVE_MAX_DATE_RANGE=120
    networks:
      - geon_net
    depends_on:
      opencti:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f connector || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  opencti-connector-datasets:
    image: opencti/connector-opencti:${OPENCTI_VERSION}
    container_name: geon-connector-datasets
    restart: unless-stopped
    environment:
      - OPENCTI_URL=http://opencti:8080/opencti
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${OPENCTI_DATASETS_CONNECTOR_ID}
      - CONNECTOR_NAME=OpenCTI Datasets
      - CONNECTOR_SCOPE=marking-definition,identity,location
      - CONNECTOR_TYPE=EXTERNAL_IMPORT
      - CONNECTOR_LOG_LEVEL=info
      - CONNECTOR_RUN_AND_TERMINATE=false
      - CONFIG_SECTORS_FILE_URL=https://raw.githubusercontent.com/OpenCTI-Platform/datasets/master/data/sectors.json
      - CONFIG_GEOGRAPHY_FILE_URL=https://raw.githubusercontent.com/OpenCTI-Platform/datasets/master/data/geography.json
      - CONFIG_COMPANIES_FILE_URL=https://raw.githubusercontent.com/OpenCTI-Platform/datasets/master/data/companies.json
      - CONFIG_INTERVAL=7
    networks:
      - geon_net
    depends_on:
      opencti:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f connector || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ===========================================================================
  # n8n — Workflow Automation (RSS, enrichment, alerts)
  # ===========================================================================
  n8n:
    image: docker.n8n.io/n8nio/n8n:1.70.3
    container_name: geon-n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=${GEON_DOMAIN}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://${GEON_DOMAIN}/n8n/
      - N8N_PATH=/n8n/
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_TEMPLATES_ENABLED=true
      - GENERIC_TIMEZONE=Europe/Paris
      - DB_TYPE=sqlite
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    volumes:
      - geon_n8n_data:/home/node/.n8n
    networks:
      - geon_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/n8n/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "geon.service=n8n"
      - "geon.role=automation"

  # ===========================================================================
  # AUTHELIA — Authentication & MFA
  # ===========================================================================
  authelia:
    image: authelia/authelia
    container_name: geon-authelia
    restart: unless-stopped
    environment:
      - AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET=${AUTHELIA_JWT_SECRET}
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY=${AUTHELIA_STORAGE_ENCRYPTION_KEY}
    volumes:
      - ./authelia/configuration.yml:/config/configuration.yml:ro
      - ./authelia/users_database.yml:/config/users_database.yml:ro
      - geon_authelia_data:/config/data
    networks:
      - geon_net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9091/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "geon.service=authelia"
      - "geon.role=authentication"

  # ===========================================================================
  # PROMETHEUS — Monitoring & Metrics
  # ===========================================================================
  prometheus:
    image: prom/prometheus
    container_name: geon-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - geon_prometheus_data:/prometheus
    networks:
      - geon_net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "geon.service=prometheus"
      - "geon.role=monitoring"

  # ===========================================================================
  # GRAFANA — Dashboards (Geopolitical + CTI + Monitoring)
  # ===========================================================================
  grafana:
    image: grafana/grafana:10.4.15
    container_name: geon-grafana
    restart: unless-stopped
    environment:
      - GF_SERVER_ROOT_URL=https://${GEON_DOMAIN}/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${ELASTIC_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    volumes:
      - geon_grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - geon_net
    depends_on:
      prometheus:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    labels:
      - "geon.service=grafana"
      - "geon.role=dashboards"

  # ===========================================================================
  # INGESTOR — GDELT / ACLED / Sanctions / Correlation cron
  # ===========================================================================
  ingestor:
    image: geon-ingestor
    build:
      context: ../ingestors
      dockerfile: Dockerfile
    container_name: geon-ingestor
    restart: unless-stopped
    environment:
      - ES_HOST=elasticsearch
      - ES_SCHEME=http
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - OPENCTI_URL=http://opencti:8080/opencti
      - OPENCTI_ADMIN_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - ACLED_API_KEY=${ACLED_API_KEY}
      - ACLED_EMAIL=${ACLED_EMAIL}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    networks:
      - geon_net
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os,signal; os.kill(1, 0)' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "geon.service=ingestor"
      - "geon.role=data-ingestion"
