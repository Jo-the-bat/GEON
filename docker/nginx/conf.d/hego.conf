# =============================================================================
# HEGO — Nginx Virtual Host Configuration
# Domain: hego.joranbatty.fr
# =============================================================================

# ---------------------------------------------------------------------------
# HTTP — Redirect to HTTPS (except ACME challenge for Let's Encrypt)
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name hego.joranbatty.fr;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — Main server block
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name hego.joranbatty.fr;

    # -----------------------------------------------------------------------
    # TLS Configuration (Let's Encrypt via Certbot)
    # -----------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/hego.joranbatty.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hego.joranbatty.fr/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # -----------------------------------------------------------------------
    # Authelia — Forward Authentication Endpoint
    # -----------------------------------------------------------------------
    # Internal endpoint used by auth_request in protected locations.
    location /auth/api/verify {
        internal;
        proxy_pass http://authelia_backend/api/verify;

        proxy_pass_request_body off;
        proxy_set_header Content-Length "";

        # Forward original request info to Authelia
        proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Uri $request_uri;
    }

    # -----------------------------------------------------------------------
    # Authelia Portal — /auth
    # -----------------------------------------------------------------------
    location /auth {
        limit_req zone=auth_limit burst=10 nodelay;

        proxy_pass http://authelia_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Uri $request_uri;
    }

    # -----------------------------------------------------------------------
    # Landing Page — / (static, no auth required)
    # -----------------------------------------------------------------------
    location / {
        root /usr/share/nginx/html/landing;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # -----------------------------------------------------------------------
    # Kibana — /kibana (protected by Authelia)
    # -----------------------------------------------------------------------
    location /kibana {
        # Authelia forward auth
        auth_request /auth/api/verify;
        auth_request_set $target_url $scheme://$http_host$request_uri;
        auth_request_set $user $upstream_http_remote_user;
        auth_request_set $groups $upstream_http_remote_groups;
        auth_request_set $name $upstream_http_remote_name;
        auth_request_set $email $upstream_http_remote_email;
        error_page 401 =302 https://$http_host/auth/?rd=$target_url;

        proxy_pass http://kibana_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;

        # WebSocket support for Kibana
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Buffering
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # -----------------------------------------------------------------------
    # OpenCTI — /opencti (protected by Authelia)
    # -----------------------------------------------------------------------
    location /opencti {
        # Authelia forward auth
        auth_request /auth/api/verify;
        auth_request_set $target_url $scheme://$http_host$request_uri;
        auth_request_set $user $upstream_http_remote_user;
        auth_request_set $groups $upstream_http_remote_groups;
        auth_request_set $name $upstream_http_remote_name;
        auth_request_set $email $upstream_http_remote_email;
        error_page 401 =302 https://$http_host/auth/?rd=$target_url;

        proxy_pass http://opencti_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;

        # WebSocket support for OpenCTI
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Large payloads for STIX bundles
        client_max_body_size 200m;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # -----------------------------------------------------------------------
    # Huginn — /huginn (protected by Authelia)
    # -----------------------------------------------------------------------
    location /huginn {
        # Authelia forward auth
        auth_request /auth/api/verify;
        auth_request_set $target_url $scheme://$http_host$request_uri;
        auth_request_set $user $upstream_http_remote_user;
        auth_request_set $groups $upstream_http_remote_groups;
        auth_request_set $name $upstream_http_remote_name;
        auth_request_set $email $upstream_http_remote_email;
        error_page 401 =302 https://$http_host/auth/?rd=$target_url;

        proxy_pass http://huginn_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;

        # WebSocket support for Huginn
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
    }

    # -----------------------------------------------------------------------
    # Grafana — /grafana (protected by Authelia)
    # -----------------------------------------------------------------------
    location /grafana {
        # Authelia forward auth
        auth_request /auth/api/verify;
        auth_request_set $target_url $scheme://$http_host$request_uri;
        auth_request_set $user $upstream_http_remote_user;
        auth_request_set $groups $upstream_http_remote_groups;
        auth_request_set $name $upstream_http_remote_name;
        auth_request_set $email $upstream_http_remote_email;
        error_page 401 =302 https://$http_host/auth/?rd=$target_url;

        proxy_pass http://grafana_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;

        # WebSocket support for Grafana live
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # -----------------------------------------------------------------------
    # Deny access to hidden files
    # -----------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
