# =============================================================================
# GEON — Grafana Provisioning: Datasources
# Auto-provisioned on first boot
# =============================================================================

apiVersion: 1

datasources:
  # ---------------------------------------------------------------------------
  # Prometheus — Primary metrics source (default)
  # ---------------------------------------------------------------------------
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: '30s'
      queryTimeout: '60s'
      httpMethod: 'POST'
    version: 1

  # ---------------------------------------------------------------------------
  # Elasticsearch — Event and intelligence data
  # ---------------------------------------------------------------------------
  - name: Elasticsearch
    uid: elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    isDefault: false
    editable: false
    basicAuth: true
    basicAuthUser: elastic
    jsonData:
      index: 'geon-*'
      timeField: 'date'
      esVersion: '8.17.0'
      maxConcurrentShardRequests: 5
      logMessageField: 'description'
      logLevelField: 'severity'
    secureJsonData:
      basicAuthPassword: $ELASTIC_PASSWORD
    version: 1
