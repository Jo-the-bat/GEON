# =============================================================================
# HEGO — Grafana Provisioning: Datasources
# Auto-provisioned on first boot
# =============================================================================

apiVersion: 1

datasources:
  # ---------------------------------------------------------------------------
  # Prometheus — Primary metrics source
  # ---------------------------------------------------------------------------
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: '30s'
      queryTimeout: '60s'
      httpMethod: 'POST'
    version: 1

  # ---------------------------------------------------------------------------
  # Elasticsearch — Log and event data
  # ---------------------------------------------------------------------------
  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    editable: false
    isDefault: false
    jsonData:
      index: 'hego-*'
      timeField: 'date'
      esVersion: '8.0.0'
      maxConcurrentShardRequests: 5
      logMessageField: 'description'
      logLevelField: 'severity'
    secureJsonData:
      basicAuthPassword: '${ELASTIC_PASSWORD}'
    basicAuth: true
    basicAuthUser: 'elastic'
    version: 1
